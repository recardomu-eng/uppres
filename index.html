<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket Crash Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Arial', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Игровое поле */
        .game-area { flex: 1; position: relative; background: radial-gradient(circle at bottom left, #1a1f26, #0b0e11); overflow: hidden; border-bottom: 2px solid #2b3139; }
        
        #multiplier { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); font-size: 50px; font-weight: bold; color: #f0b90b; z-index: 10; }
        
        #rocket { position: absolute; bottom: 50px; left: 50px; font-size: 40px; transition: all 0.1s linear; z-index: 5; }

        /* Список игроков */
        .players-list { height: 150px; background: #161a1e; overflow-y: auto; padding: 10px; font-size: 12px; }
        .player-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #2b3139; }
        .player-win { color: #02c076; }

        /* Панель управления */
        .controls { background: #1e2329; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bet-input-group { display: flex; gap: 10px; }
        input { flex: 1; background: #2b3139; border: 1px solid #474d57; color: white; padding: 12px; border-radius: 4px; outline: none; }
        
        button { width: 100%; padding: 15px; border-radius: 4px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-bet { background: #f0b90b; color: #000; }
        .btn-cashout { background: #02c076; color: white; }
        .crashed-text { color: #f6465d; }
    </style>
</head>
<body>

<div class="game-area">
    <div id="multiplier">x1.00</div>
    <div id="rocket">🚀</div>
</div>

<div class="players-list" id="players">
    <div style="color: #848e9c; margin-bottom: 5px;">LIVE СТАВКИ:</div>
    </div>

<div class="controls">
    <div class="bet-input-group">
        <input type="number" id="bet-amount" placeholder="Сумма TON" value="0.5">
    </div>
    <button id="main-btn" class="btn-bet" onclick="handleBtn()">ПОСТАВИТЬ</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let rocket = document.getElementById('rocket');
    let multText = document.getElementById('multiplier');
    let btn = document.getElementById('main-btn');
    let playersList = document.getElementById('players');

    let isFlying = false;
    let currentMult = 1.0;
    let crashPoint = 0;
    let gameLoop;

    // Список ботов для имитации игроков
    const botNames = ["@crypto_king", "@ton_master", "@ivan_rich", "@lucky_guy", "@tgram_user"];

    function handleBtn() {
        if (!isFlying) startGame();
        else cashOut();
    }

    function startGame() {
        let bet = document.getElementById('bet-amount').value;
        if (bet <= 0) return;

        // Сброс позиции
        isFlying = true;
        currentMult = 1.0;
        rocket.style.bottom = "50px";
        rocket.style.left = "50px";
        rocket.innerText = "🚀";
        multText.classList.remove('crashed-text');
        
        btn.innerText = "ВЫВЕСТИ";
        btn.className = "btn-cashout";

        // Генерация краша (казино-логика)
        crashPoint = Math.random() < 0.4 ? 1.0 + Math.random() * 0.3 : 1.2 + Math.random() * 5;

        // Очистка и добавление имитации игроков
        playersList.innerHTML = '<div style="color: #848e9c;">LIVE СТАВКИ:</div>';
        addFakePlayers();

        gameLoop = setInterval(() => {
            currentMult += 0.01 * (currentMult * 0.5);
            multText.innerText = "x" + currentMult.toFixed(2);

            // Анимация полета вверх и вправо
            let offset = (currentMult - 1) * 40; 
            rocket.style.bottom = (50 + offset * 1.5) + "px";
            rocket.style.left = (50 + offset * 2) + "px";

            if (currentMult >= crashPoint) {
                doCrash();
            }
        }, 100);
    }

    function doCrash() {
        clearInterval(gameLoop);
        isFlying = false;
        multText.innerText = "CRASHED";
        multText.classList.add('crashed-text');
        rocket.innerText = "💥";
        btn.innerText = "ПОСТАВИТЬ";
        btn.className = "btn-bet";
    }

    function cashOut() {
        if (!isFlying) return;
        clearInterval(gameLoop);
        isFlying = false;
        
        let win = (document.getElementById('bet-amount').value * currentMult).toFixed(2);
        alert("Вы забрали " + win + " TON!");
        
        btn.innerText = "ПОСТАВИТЬ";
        btn.className = "btn-bet";

        tg.sendData(JSON.stringify({action: "win", sum: win}));
    }

    function addFakePlayers() {
        botNames.forEach(name => {
            let row = document.createElement('div');
            row.className = 'player-row';
            row.innerHTML = `<span>${name}</span><span>${(Math.random()*2).toFixed(1)} TON</span>`;
            playersList.appendChild(row);
        });
    }
</script>

</body>
</html>
