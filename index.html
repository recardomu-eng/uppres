<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket Crash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .game-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        #multiplier { font-size: 60px; font-weight: bold; color: #ff9500; margin: 20px 0; }
        .rocket { font-size: 80px; transition: transform 0.1s linear; }
        
        .controls { background: #1c1c1c; width: 100%; padding: 20px; border-radius: 20px 20px 0 0; position: fixed; bottom: 0; }
        input { background: #333; border: 1px solid #444; color: white; padding: 10px; border-radius: 10px; width: 80%; margin-bottom: 10px; font-size: 18px; }
        
        button { width: 85%; padding: 15px; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-bet { background: #ff9500; color: white; }
        .btn-cashout { background: #2ecc71; color: white; display: none; }
        
        .status { margin-top: 10px; color: #aaa; height: 20px; }
        .crashed { color: #ff4757 !important; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="multiplier">x1.00</div>
    <div id="rocket" class="rocket">🚀</div>
    <div id="status-text" class="status">Введите ставку TON</div>
</div>

<div class="controls">
    <input type="number" id="bet-amount" placeholder="Ставка (например, 0.5)">
    <button id="main-btn" class="btn-bet" onclick="startRound()">ПОСТАВИТЬ</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let multiplierText = document.getElementById('multiplier');
    let rocket = document.getElementById('rocket');
    let btn = document.getElementById('main-btn');
    let statusText = document.getElementById('status-text');
    let betInput = document.getElementById('bet-amount');

    let currentMultiplier = 1.0;
    let gameInterval;
    let isFlying = false;
    let crashPoint = 0;

    function startRound() {
        let bet = betInput.value;
        if (bet <= 0) return alert("Введите ставку!");

        // Логика казино: шанс проигрыша
        // Генерируем точку взрыва. Чем выше число, тем меньше шанс.
        let rand = Math.random();
        if (rand < 0.5) { 
            crashPoint = 1.0 + Math.random() * 0.5; // 50% шанс взрыва до x1.5
        } else {
            crashPoint = 1.0 + Math.pow(Math.random(), 2) * 10; // Шанс на высокий икс
        }

        isFlying = true;
        currentMultiplier = 1.0;
        btn.innerText = "ЗАБРАТЬ (CASH OUT)";
        btn.className = "btn-cashout";
        statusText.innerText = "Ракета летит...";
        statusText.classList.remove('crashed');

        gameInterval = setInterval(() => {
            currentMultiplier += 0.01 + (currentMultiplier * 0.005);
            multiplierText.innerText = "x" + currentMultiplier.toFixed(2);
            
            // Анимация тряски
            rocket.style.transform = `translateY(${Math.random() * 5}px) scale(${1 + currentMultiplier/20})`;

            // ПРОВЕРКА НА КРАШ
            if (currentMultiplier >= crashPoint) {
                crash();
            }
        }, 100);
    }

    function crash() {
        clearInterval(gameInterval);
        isFlying = false;
        multiplierText.innerText = "CRASHED!";
        multiplierText.classList.add('crashed');
        rocket.innerText = "💥";
        btn.innerText = "ПОПРОБОВАТЬ СНОВА";
        btn.className = "btn-bet";
        statusText.innerText = "Вы проиграли свою ставку";
        
        setTimeout(() => {
            rocket.innerText = "🚀";
            multiplierText.classList.remove('crashed');
            multiplierText.innerText = "x1.00";
        }, 2000);
    }

    function cashOut() {
        if (!isFlying) return;
        
        clearInterval(gameInterval);
        isFlying = false;
        let winAmount = (betInput.value * currentMultiplier).toFixed(2);
        
        alert(`Вы выиграли ${winAmount} TON!`);
        
        // Отправляем данные в бот
        tg.sendData(JSON.stringify({
            action: "win",
            amount: winAmount,
            multiplier: currentMultiplier.toFixed(2)
        }));

        btn.innerText = "ПОСТАВИТЬ";
        btn.className = "btn-bet";
        statusText.innerText = "Выигрыш зачислен!";
    }

    // Переключаем функцию кнопки
    btn.onclick = function() {
        if (!isFlying) startRound();
        else cashOut();
    };
</script>

</body>
</html>
