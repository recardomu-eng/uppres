<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift App Loader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: #1c1c1c; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Экран загрузки */
        #loader {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #121212;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }

        .rocket {
            font-size: 80px;
            margin-bottom: 20px;
            animation: shake 0.5s infinite;
        }

        /* Анимация тряски ракеты */
        @keyframes shake {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        .progress-container {
            width: 70%; height: 8px;
            background: #333; border-radius: 10px;
            overflow: hidden; margin-top: 20px;
        }

        .progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #f39c12, #e67e22);
            transition: width 0.1s;
        }

        .percent {
            font-size: 24px; font-weight: bold; margin-top: 10px;
        }

        /* Контент самого приложения (скрыт изначально) */
        #main-content {
            display: none; padding: 20px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="rocket">🚀</div>
        <div class="percent" id="percent-text">0%</div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <div id="main-content">
        <h1>Приложение готово!</h1>
        <p>Добро пожаловать в GiftUp Clone</p>
        <button onclick="window.Telegram.WebApp.close()" style="background:#f39c12; border:none; color:white; padding:15px; border-radius:10px;">Закрыть</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let percentText = document.getElementById('percent-text');
        let progressBar = document.getElementById('progress-bar');
        let loader = document.getElementById('loader');
        let mainContent = document.getElementById('main-content');

        let width = 0;
        
        // Функция симуляции загрузки
        let interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                // Прячем ракету и показываем контент
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    mainContent.style.display = 'block';
                }, 500);
            } else {
                width += Math.floor(Math.random() * 5) + 1; // Случайная скорость
                if (width > 100) width = 100;
                percentText.innerText = width + '%';
                progressBar.style.width = width + '%';
            }
        }, 100); // Скорость обновления
    </script>
</body>
</html>
