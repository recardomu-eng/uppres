<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GiftUp Loading</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000; color: white; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-family: sans-serif; overflow: hidden;
        }

        /* Анимация ракеты */
        .rocket-container {
            font-size: 60px;
            animation: fly 0.6s infinite ease-in-out;
        }

        @keyframes fly {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Текст процентов */
        .loading-text {
            margin-top: 20px; font-size: 24px; font-weight: bold;
            letter-spacing: 1px;
        }

        /* Полоска загрузки */
        .progress-container {
            width: 200px; height: 6px; background: #333;
            border-radius: 10px; margin-top: 15px; overflow: hidden;
        }

        .progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #ff9500, #ffcc00);
            transition: width 0.2s;
        }

        /* Основной контент после загрузки (пока пустой) */
        #content { display: none; text-align: center; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="rocket-container">🚀</div>
        <div class="loading-text" id="percent">0%</div>
        <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
        </div>
    </div>

    <div id="content">
        <h2 style="color: #ff9500;">ПРИЛОЖЕНИЕ ГОТОВО</h2>
        <p>Здесь будут твои подарки</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на всё окно

        let percentDisplay = document.getElementById('percent');
        let barDisplay = document.getElementById('bar');
        let loader = document.getElementById('loader');
        let content = document.getElementById('content');

        let progress = 0;

        // Имитация загрузки
        let interval = setInterval(() => {
            progress += Math.floor(Math.random() * 7) + 2; // Рандомная скорость
            if (progress > 100) progress = 100;

            percentDisplay.innerText = progress + '%';
            barDisplay.style.width = progress + '%';

            if (progress === 100) {
                clearInterval(interval);
                setTimeout(() => {
                    loader.style.display = 'none';
                    content.style.display = 'block';
                }, 500);
            }
        }, 150);
    </script>
</body>
</html>
